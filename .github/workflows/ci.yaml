name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Run Biome
        run: pnpm check
      - name: Run unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm test:e2e
